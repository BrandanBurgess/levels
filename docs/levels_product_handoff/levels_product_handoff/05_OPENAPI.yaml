        removal_reason: {type: [string, "null"]}
        sets:
          type: array
          items: {$ref: "#/components/schemas/SetLog"}

    WorkoutSession:
      type: object
      additionalProperties: false
      required: [id, version, session_date_local, started_at, status, title, exercises]
      properties:
        id: {type: string}
