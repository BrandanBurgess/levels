openapi: 3.1.0
info:
  title: LEVELS API
  version: 2.0.0
  description: Private multi-account workout tracking API with an anonymous read-only demo.
servers:
  - url: http://localhost:8000/api/v1
    description: Local
tags:
  - name: Health
  - name: Auth
  - name: Demo
  - name: Profile
  - name: Today
  - name: Exercises
  - name: Splits
  - name: Sessions
  - name: Water
  - name: Progress
  - name: Growth
security: [{bearerAuth: []}]
paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Healthy service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestV2"
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422": {$ref: "#/components/responses/ValidationError"}
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/RegisterRequest"}
      responses:
        "201":
          description: Account created and authenticated.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AuthResponse"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
        "429": {$ref: "#/components/responses/TooManyRequests"}

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CurrentUser"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security: [{bearerAuth: []}]
      responses:
        "204": {description: Local authentication state may be cleared.}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /demo/bootstrap:
    get:
      tags: [Demo]
      operationId: getDemoBootstrap
      security: []
      responses:
        "200":
          description: Fictional read-only demo data.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/DemoBootstrap"}

  /me/profile:
    get:
      tags: [Profile]
      operationId: getMyProfile
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Current user's profile.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Profile"}
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Profile]
      operationId: updateMyProfile
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Profile"}
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422": {$ref: "#/components/responses/ValidationError"}

  /me/avatar:
    get:
      tags: [Profile]
      operationId: getMyAvatar
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Current user's avatar appearance.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AvatarSettings"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    patch:
      tags: [Profile]
      operationId: updateMyAvatar
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/AvatarSettingsUpdate"}
      responses:
        "200":
          description: Updated avatar appearance.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AvatarSettings"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /me/streak:
    get:
      tags: [Profile]
      operationId: getMyStreak
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Current user's schedule-aware streak.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/StreakSummary"}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /today:
    get:
      tags: [Today]
      operationId: getToday
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/LocalDate"
      responses:
        "200":
          description: Planned and effective workout for the requested local date.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TodayV2"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /today/override:
    put:
      tags: [Today]
      operationId: putTodayOverride
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/TodayOverrideRequest"}
      responses:
        "200":
          description: Updated effective plan.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TodayV2"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
    delete:
      tags: [Today]
      operationId: deleteTodayOverride
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/LocalDateRequired"
        - $ref: "#/components/parameters/ExpectedVersion"
      responses:
        "204": {description: Override removed.}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}

  /today/skip:
    post:
      tags: [Today]
      operationId: skipToday
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SkipTodayRequest"}
      responses:
        "200":
          description: Today skipped and schedule updated.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TodayV2"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /today/exercises:
    put:
      tags: [Today]
      operationId: replaceTodayExercisePlan
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/TodayExercisePlanUpdate"}
      responses:
        "200":
          description: Updated effective exercise plan.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TodayV2"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /settings:
    get:
      tags: [Profile]
      operationId: getSettings
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Profile]
      operationId: updateSettings
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /exercises:
    get:
      tags: [Exercises]
      operationId: listAvailableExercises
      security: [{bearerAuth: []}]
      parameters:
        - {name: scope, in: query, schema: {type: string, enum: [available, global, mine], default: available}}
        - {name: search, in: query, schema: {type: string}}
        - {name: muscle_id, in: query, schema: {type: string}}
        - {name: movement_pattern, in: query, schema: {type: string}}
        - {name: equipment, in: query, schema: {type: string}}
        - {name: measurement_type, in: query, schema: {type: string, enum: [load_reps, bodyweight_reps, duration, distance, rounds]}}
      responses:
        "200":
          description: Exercise list.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ExerciseList"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    post:
      tags: [Exercises]
      operationId: createExercise
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ExerciseWrite"}
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Exercise"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /muscles:
    get:
      tags: [Exercises]
      operationId: listMuscleGroups
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Shared read-only muscle catalog.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/MuscleGroup"}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /exercises/{exercise_id}:
    parameters:
      - $ref: "#/components/parameters/ExerciseId"
    get:
      tags: [Exercises]
      operationId: getExercise
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Exercise.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Exercise"}
        "404": {$ref: "#/components/responses/NotFound"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    patch:
      tags: [Exercises]
      operationId: updateExercise
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ExerciseWrite"}
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Exercise"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
    delete:
      tags: [Exercises]
      operationId: archiveExercise
      security: [{bearerAuth: []}]
      responses:
        "204": {description: Archived.}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}

  /splits:
    get:
      tags: [Splits]
      operationId: listSplits
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Splits.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Split"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    post:
      tags: [Splits]
      operationId: createSplit
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SplitWrite"}
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Split"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /splits/{split_id}:
    parameters:
      - $ref: "#/components/parameters/SplitId"
    get:
      tags: [Splits]
      operationId: getSplit
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Split.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Split"}
        "404": {$ref: "#/components/responses/NotFound"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    patch:
      tags: [Splits]
      operationId: updateSplit
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SplitWrite"}
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Split"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
    delete:
      tags: [Splits]
      operationId: archiveSplit
      security: [{bearerAuth: []}]
      responses:
        "204": {description: Archived.}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}

  /splits/{split_id}/activate:
    post:
      tags: [Splits]
      operationId: activateSplit
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/SplitId"
      responses:
        "200":
          description: Activated split.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Split"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}

  /sessions:
    get:
      tags: [Sessions]
      operationId: listSessions
      security: [{bearerAuth: []}]
      parameters:
        - {name: from, in: query, schema: {type: string, format: date}}
        - {name: to, in: query, schema: {type: string, format: date}}
        - {name: exercise_id, in: query, schema: {type: string}}
      responses:
        "200":
          description: Sessions, filtered by visibility.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    post:
      tags: [Sessions]
      operationId: startSession
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/StartSession"}
      responses:
        "201":
          description: Started session.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /sessions/{session_id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Sessions]
      operationId: getSession
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Session, filtered by visibility.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "404": {$ref: "#/components/responses/NotFound"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    patch:
      tags: [Sessions]
      operationId: updateSession
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SessionUpdate"}
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
    delete:
      tags: [Sessions]
      operationId: deleteSession
      security: [{bearerAuth: []}]
      responses:
        "204": {description: Soft deleted.}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}

  /sessions/{session_id}/exercises:
    post:
      tags: [Sessions]
      operationId: addOrSubstituteSessionExercise
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/AddSessionExercise"}
      responses:
        "201":
          description: Added/substituted.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SessionExercise"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /sessions/{session_id}/exercises/{session_exercise_id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/SessionExerciseId"
    patch:
      tags: [Sessions]
      operationId: updateSessionExercise
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SessionExerciseUpdate"}
      responses:
        "200":
          description: Updated active-session exercise snapshot.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
    delete:
      tags: [Sessions]
      operationId: removeSessionExercise
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/ExpectedVersion"
        - name: confirm_logged_sets
          in: query
          required: false
          schema: {type: boolean, default: false}
      responses:
        "200":
          description: Exercise soft-removed from the active session.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}

  /sessions/{session_id}/exercises/reorder:
    post:
      tags: [Sessions]
      operationId: reorderSessionExercises
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ReorderSessionExercises"}
      responses:
        "200":
          description: Reordered active-session exercises.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /sessions/{session_id}/sets:
    post:
      tags: [Sessions]
      operationId: createSet
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SetWrite"}
      responses:
        "201":
          description: Set and record result.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SetWriteResponse"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /sets/{set_id}:
    parameters:
      - $ref: "#/components/parameters/SetId"
    patch:
      tags: [Sessions]
      operationId: updateSet
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SetWrite"}
      responses:
        "200":
          description: Updated set and affected records.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SetWriteResponse"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}
    delete:
      tags: [Sessions]
      operationId: deleteSet
      security: [{bearerAuth: []}]
      responses:
        "204": {description: Deleted and records rebuilt.}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}

  /sessions/{session_id}/complete:
    post:
      tags: [Sessions]
      operationId: completeSession
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      responses:
        "200":
          description: Completed session.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkoutSession"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}

  /water/today:
    get:
      tags: [Water]
      operationId: getWaterToday
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/LocalDate"
      responses:
        "200":
          description: Visible daily hydration.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WaterDay"}
        "401": {$ref: "#/components/responses/Unauthorized"}
    post:
      tags: [Water]
      operationId: addWater
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/WaterWrite"}
      responses:
        "201":
          description: Added.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WaterDay"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/ValidationError"}

  /water/today/undo:
    post:
      tags: [Water]
      operationId: undoWater
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Latest entry removed.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WaterDay"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "409": {$ref: "#/components/responses/Conflict"}

  /records:
    get:
      tags: [Progress]
      operationId: listRecords
      security: [{bearerAuth: []}]
      parameters:
        - {name: exercise_id, in: query, schema: {type: string}}
        - {name: current_only, in: query, schema: {type: boolean, default: true}}
      responses:
        "200":
          description: Visible records.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/PersonalRecord"}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /growth/suggestions:
    get:
      tags: [Growth]
      operationId: getGrowthSuggestions
      security: [{bearerAuth: []}]
      parameters:
        - $ref: "#/components/parameters/LocalDate"
        - {name: split_day_id, in: query, schema: {type: string}}
      responses:
        "200":
          description: Explainable suggestions.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/GrowthSuggestion"}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /export:
    get:
      tags: [Progress]
      operationId: exportData
      security: [{bearerAuth: []}]
      parameters:
        - name: format
          in: query
          required: true
          schema: {type: string, enum: [json, csv]}
      responses:
        "200":
          description: Export.
          content:
            application/json:
              schema: {type: object}
            text/csv:
              schema: {type: string}
        "401": {$ref: "#/components/responses/Unauthorized"}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LocalDate:
      name: date
      in: query
      schema: {type: string, format: date}
    LocalDateRequired:
      name: local_date
      in: query
      required: true
      schema: {type: string, format: date}
    ExerciseId:
      name: exercise_id
      in: path
      required: true
      schema: {type: string}
    SplitId:
      name: split_id
      in: path
      required: true
      schema: {type: string}
    SessionId:
      name: session_id
      in: path
      required: true
      schema: {type: string}
    SessionExerciseId:
      name: session_exercise_id
      in: path
      required: true
      schema: {type: string}
    SetId:
      name: set_id
      in: path
      required: true
      schema: {type: string}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: {type: string, minLength: 8, maxLength: 128}
    IdempotencyKeyRequired:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 8, maxLength: 128}
    ExpectedVersion:
      name: expected_version
      in: query
      required: true
      schema: {type: integer, minimum: 0}

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    Unauthorized:
      description: Authentication required or invalid.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    Forbidden:
      description: Authenticated actor is not allowed to perform this operation.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotFound:
      description: Not found.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    Conflict:
      description: Request conflicts with current state or optimistic-concurrency version.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    ValidationError:
      description: Semantically invalid request.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    TooManyRequests:
      description: Rate limited.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status: {type: string, enum: [ok]}
        version: {type: string}
        database: {type: string, enum: [ok, degraded]}

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: {type: string}
            message: {type: string}
            field_errors:
              type: object
              additionalProperties: {type: string}
            current_version: {type: integer, minimum: 0}
            request_id: {type: string}

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, display_name]
      properties:
        email: {type: string, format: email, maxLength: 254}
        password: {type: string, minLength: 10, maxLength: 256, writeOnly: true}
        display_name: {type: string, minLength: 1, maxLength: 80}
        timezone: {type: string, default: America/Toronto}
        preferred_units: {type: string, enum: [metric, imperial], default: metric}

    LoginRequestV2:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: {type: string, format: email, maxLength: 254}
        password: {type: string, minLength: 1, maxLength: 256, writeOnly: true}

    AuthResponse:
      type: object
      additionalProperties: false
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token: {type: string}
        token_type: {type: string, const: Bearer}
        expires_in: {type: integer, minimum: 1}
        user: {$ref: "#/components/schemas/CurrentUser"}

    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, email, display_name, role, account_status, timezone, preferred_units]
      properties:
        id: {type: string}
        email: {type: string, format: email}
        display_name: {type: string}
        role: {type: string, enum: [member, admin]}
        account_status: {type: string, enum: [active, disabled], readOnly: true}
        timezone: {type: string}
        preferred_units: {type: string, enum: [metric, imperial]}

    PublicProfile:
      type: object
      additionalProperties: false
      required: [display_name, preferred_units, timezone]
      properties:
        display_name: {type: string}
        height_cm: {type: [integer, "null"]}
        body_weight_kg: {type: [number, "null"]}
        preferred_units: {type: string, enum: [imperial, metric]}
        timezone: {type: string}

    Profile:
      type: object
      additionalProperties: false
      required: [id, display_name, preferred_units, timezone]
      properties:
        id: {type: string}
        display_name: {type: string}
        height_cm: {type: [integer, "null"]}
        body_weight_kg: {type: [number, "null"]}
        preferred_units: {type: string, enum: [imperial, metric]}
        timezone: {type: string}

    AvatarSettings:
      type: object
      additionalProperties: false
      required: [base_presentation, skin_tone, hairstyle, hair_color, outfit_style, outfit_palette, accessory, background, aura_style, aura_enabled]
      properties:
        base_presentation: {type: string, enum: [male, female]}
        skin_tone: {type: string, enum: [deep, rich, medium_deep, medium, light_medium, light]}
        hairstyle: {type: string, enum: [short_coils, fade, waves, short_locs, locs, braids, long_curls, curly_bob, bun, bob, short_straight, covered, bald]}
        hair_color: {type: string, enum: [black, dark_brown, brown, auburn, gray, blonde]}
        outfit_style: {type: string, enum: [training_tee, tank_and_shorts, long_sleeve, modest_activewear]}
        outfit_palette: {type: string, enum: [violet, teal, blue, rose, neutral]}
        accessory: {type: string, enum: [none, glasses, headband, wristbands, cap]}
        background: {type: string, enum: [none, gradient, gym, dusk]}
        aura_style: {type: string, enum: [standard, rings, sparks]}
        aura_enabled: {type: boolean}

    AvatarSettingsUpdate:
      type: object
      additionalProperties: false
      properties:
        base_presentation: {type: string, enum: [male, female]}
        skin_tone: {type: string, enum: [deep, rich, medium_deep, medium, light_medium, light]}
        hairstyle: {type: string, enum: [short_coils, fade, waves, short_locs, locs, braids, long_curls, curly_bob, bun, bob, short_straight, covered, bald]}
        hair_color: {type: string, enum: [black, dark_brown, brown, auburn, gray, blonde]}
        outfit_style: {type: string, enum: [training_tee, tank_and_shorts, long_sleeve, modest_activewear]}
        outfit_palette: {type: string, enum: [violet, teal, blue, rose, neutral]}
        accessory: {type: string, enum: [none, glasses, headband, wristbands, cap]}
        background: {type: string, enum: [none, gradient, gym, dusk]}
        aura_style: {type: string, enum: [standard, rings, sparks]}
        aura_enabled: {type: boolean}

    StreakSummary:
      type: object
      additionalProperties: false
      required: [current_count, longest_count, tier, last_qualified_local_date, next_milestone]
      properties:
        current_count: {type: integer, minimum: 0}
        longest_count: {type: integer, minimum: 0}
        tier: {type: string, enum: [none, subtle, active, energized, legendary]}
        last_qualified_local_date: {type: [string, "null"], format: date}
        next_milestone: {type: [integer, "null"], minimum: 1}

    ProfileUpdate:
      type: object
      additionalProperties: false
      properties:
        display_name: {type: string, minLength: 1, maxLength: 100}
        height_cm: {type: [integer, "null"], minimum: 100, maximum: 250}
        body_weight_kg: {type: [number, "null"], minimum: 20, maximum: 400}
        preferred_units: {type: string, enum: [imperial, metric]}
        timezone: {type: string}

    Visibility:
      type: object
      additionalProperties: false
      properties:
        show_height: {type: boolean}
        show_body_weight: {type: boolean}
        show_water: {type: boolean}
        show_session_summaries: {type: boolean}
        show_set_details: {type: boolean}
        show_public_notes: {type: boolean}
        show_progress_charts: {type: boolean}
        show_personal_records: {type: boolean}
        show_readiness: {type: boolean}

    Settings:
      type: object
      required: [week_starts_on, default_water_goal_ml, water_quick_add_ml, reduced_motion_override, visibility]
      properties:
        active_split_id: {type: [string, "null"]}
        week_starts_on: {type: integer, minimum: 0, maximum: 6}
        default_water_goal_ml: {type: integer}
        water_quick_add_ml:
          type: array
          items: {type: integer}
        default_target_rir: {type: number}
        default_load_increment_kg: {type: number}
        reduced_motion_override: {type: [boolean, "null"]}
        visibility: {$ref: "#/components/schemas/Visibility"}

    SettingsUpdate:
      type: object
      additionalProperties: false
      properties:
        active_split_id: {type: [string, "null"]}
        week_starts_on: {type: integer, minimum: 0, maximum: 6}
        default_water_goal_ml: {type: integer, minimum: 250, maximum: 10000}
        water_quick_add_ml:
          type: array
          minItems: 1
          maxItems: 6
          items: {type: integer, minimum: 1, maximum: 5000}
        default_target_rir: {type: number, minimum: 0, maximum: 10}
        default_load_increment_kg: {type: number, exclusiveMinimum: 0}
        reduced_motion_override: {type: [boolean, "null"]}
        visibility: {$ref: "#/components/schemas/Visibility"}

    MuscleGroup:
      type: object
      additionalProperties: false
      required: [id, slug, display_name, body_region, svg_region_ids, highlightable]
      properties:
        id: {type: string}
        slug: {type: string}
        display_name: {type: string}
        body_region: {type: string}
        svg_region_ids:
          type: array
          items: {type: string}
        highlightable: {type: boolean}

    MuscleTarget:
      type: object
      additionalProperties: false
      required: [slug, display_name, role, intensity, svg_region_ids]
      properties:
        slug: {type: string}
        display_name: {type: string}
        role: {type: string, enum: [primary, secondary, stabilizer]}
        intensity: {type: number, minimum: 0, maximum: 1}
        svg_region_ids:
          type: array
          items: {type: string}

    Exercise:
      type: object
      additionalProperties: false
      required: [id, scope, can_edit, slug, name, aliases, variation_group, movement_pattern, equipment, measurement_type, compound, unilateral, automatic_progression_enabled, muscle_targets]
      properties:
        id: {type: string}
        scope: {type: string, enum: [global, custom]}
        can_edit: {type: boolean}
        slug: {type: string}
        name: {type: string}
        aliases: {type: array, items: {type: string}}
        variation_group: {type: string}
        movement_pattern: {type: string}
        equipment: {type: string}
        measurement_type: {type: string, enum: [load_reps, bodyweight_reps, duration, distance, rounds]}
        compound: {type: boolean}
        unilateral: {type: boolean}
        default_rep_min: {type: [integer, "null"]}
        default_rep_max: {type: [integer, "null"]}
        default_rest_seconds: {type: [integer, "null"]}
        automatic_progression_enabled: {type: boolean}
        muscle_targets:
          type: array
          items: {$ref: "#/components/schemas/MuscleTarget"}

    MuscleTargetInput:
      type: object
      additionalProperties: false
      required: [slug, role, intensity]
      properties:
        slug: {type: string}
        role: {type: string, enum: [primary, secondary, stabilizer]}
        intensity: {type: number, minimum: 0, maximum: 1}

    ExerciseWrite:
      type: object
      additionalProperties: false
      required: [name, slug, variation_group, movement_pattern, equipment, measurement_type, muscle_targets]
      properties:
        name: {type: string}
        slug: {type: string, pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"}
        aliases: {type: array, items: {type: string}}
        variation_group: {type: string}
        movement_pattern: {type: string}
        equipment: {type: string}
        measurement_type: {type: string, enum: [load_reps, bodyweight_reps, duration, distance, rounds]}
        compound: {type: boolean}
        unilateral: {type: boolean}
        default_rep_min: {type: [integer, "null"]}
        default_rep_max: {type: [integer, "null"]}
        default_rest_seconds: {type: [integer, "null"]}
        automatic_progression_enabled: {type: boolean}
        muscle_targets:
          type: array
          minItems: 1
          items: {$ref: "#/components/schemas/MuscleTargetInput"}

    TemplateItem:
      type: object
      required: [id, exercise, sequence, item_type, sets, optional]
      properties:
        id: {type: string}
        exercise: {$ref: "#/components/schemas/Exercise"}
        sequence: {type: integer}
        item_type: {type: string, enum: [activation, power, main, accessory, core, conditioning]}
        sets: {type: integer}
        rep_min: {type: [integer, "null"]}
        rep_max: {type: [integer, "null"]}
        duration_seconds: {type: [integer, "null"]}
        distance_meters: {type: [number, "null"]}
        rounds_target: {type: [integer, "null"]}
        rest_seconds: {type: [integer, "null"]}
        target_rir: {type: [number, "null"]}
        superset_group: {type: [string, "null"]}
        notes: {type: [string, "null"]}
        optional: {type: boolean}
        alternatives:
          type: array
          items: {$ref: "#/components/schemas/Exercise"}

    SplitDay:
      type: object
      required: [id, name, day_type, sequence, is_optional, items]
      properties:
        id: {type: string}
        name: {type: string}
        day_type: {type: string}
        sequence: {type: integer}
        is_optional: {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/TemplateItem"}

    Split:
      type: object
      required: [id, name, slug, is_active, days]
      properties:
        id: {type: string}
        name: {type: string}
        slug: {type: string}
        description: {type: [string, "null"]}
        is_active: {type: boolean}
        days:
          type: array
          items: {$ref: "#/components/schemas/SplitDay"}

    SplitWrite:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: {type: string}
        slug: {type: string}
        description: {type: [string, "null"]}
        days:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [name, day_type, sequence, is_optional, items]
            properties:
              id: {type: [string, "null"]}
              name: {type: string}
              day_type: {type: string}
              sequence: {type: integer}
              is_optional: {type: boolean}
              items:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required: [exercise_id, sequence, item_type, sets]
                  properties:
                    id: {type: [string, "null"]}
                    exercise_id: {type: string}
                    sequence: {type: integer}
                    item_type: {type: string}
                    sets: {type: integer}
                    rep_min: {type: [integer, "null"]}
                    rep_max: {type: [integer, "null"]}
                    duration_seconds: {type: [integer, "null"]}
                    distance_meters: {type: [number, "null"]}
                    rounds_target: {type: [integer, "null"]}
                    rest_seconds: {type: [integer, "null"]}
                    target_rir: {type: [number, "null"]}
                    optional: {type: boolean}
                    alternative_exercise_ids: {type: array, items: {type: string}}

    ExerciseList:
      type: array
      items: {$ref: "#/components/schemas/Exercise"}

    DailyPlanOverride:
      type: object
      additionalProperties: false
      required: [id, local_date, action, schedule_effect, version, created_at, updated_at]
      properties:
        id: {type: string}
        local_date: {type: string, format: date}
        action: {type: string, enum: [replace, swap, rest, skip]}
        planned_split_day_id: {type: [string, "null"]}
        effective_split_day_id: {type: [string, "null"]}
        swap_target_local_date: {type: [string, "null"], format: date}
        schedule_effect: {type: string, enum: [one_time, continue_from_here, swap_forward, advance, keep]}
        reason: {type: [string, "null"]}
        version: {type: integer, minimum: 0}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    ExercisePlanItemInput:
      type: object
      additionalProperties: false
      required: [exercise_id, sequence, planned_sets]
      properties:
        source_template_item_id: {type: [string, "null"]}
        exercise_id: {type: string}
        sequence: {type: integer, minimum: 0}
        item_type: {type: string, enum: [activation, power, main, accessory, core, conditioning], default: accessory}
        planned_sets: {type: integer, minimum: 1, maximum: 20}
        rep_min: {type: [integer, "null"], minimum: 0}
        rep_max: {type: [integer, "null"], minimum: 0}
        duration_seconds: {type: [integer, "null"], minimum: 0}
        distance_meters: {type: [number, "null"], minimum: 0}
        rounds_target: {type: [integer, "null"], minimum: 0}
        rest_seconds: {type: [integer, "null"], minimum: 0}
        target_rir: {type: [number, "null"], minimum: 0, maximum: 10}
        superset_group: {type: [string, "null"], maxLength: 50}
        optional: {type: boolean, default: false}
        notes: {type: [string, "null"], maxLength: 500}

    ExercisePlanItem:
      type: object
      additionalProperties: false
      required: [id, exercise, sequence, item_type, planned_sets, optional]
      properties:
        id: {type: string}
        source_template_item_id: {type: [string, "null"]}
        exercise: {$ref: "#/components/schemas/Exercise"}
        sequence: {type: integer, minimum: 0}
        item_type: {type: string, enum: [activation, power, main, accessory, core, conditioning]}
        planned_sets: {type: integer, minimum: 1, maximum: 20}
        rep_min: {type: [integer, "null"], minimum: 0}
        rep_max: {type: [integer, "null"], minimum: 0}
        duration_seconds: {type: [integer, "null"], minimum: 0}
        distance_meters: {type: [number, "null"], minimum: 0}
        rounds_target: {type: [integer, "null"], minimum: 0}
        rest_seconds: {type: [integer, "null"], minimum: 0}
        target_rir: {type: [number, "null"], minimum: 0, maximum: 10}
        superset_group: {type: [string, "null"]}
        optional: {type: boolean}
        notes: {type: [string, "null"]}

    TodayOverrideRequest:
      oneOf:
        - type: object
          title: ReplaceTodayRequest
          additionalProperties: false
          required: [local_date, action, effective_split_day_id, schedule_effect, expected_version]
          properties:
            local_date: {type: string, format: date}
            action: {type: string, const: replace}
            effective_split_day_id: {type: string}
            schedule_effect: {type: string, enum: [one_time, continue_from_here]}
            reason: {type: [string, "null"], maxLength: 300}
            expected_version: {type: integer, minimum: 0}
        - type: object
          title: SwapTodayRequest
          additionalProperties: false
          required: [local_date, action, effective_split_day_id, swap_target_local_date, schedule_effect, expected_version]
          properties:
            local_date: {type: string, format: date}
            action: {type: string, const: swap}
            effective_split_day_id: {type: string}
            swap_target_local_date: {type: string, format: date}
            schedule_effect: {type: string, const: swap_forward}
            reason: {type: [string, "null"], maxLength: 300}
            expected_version: {type: integer, minimum: 0}
        - type: object
          title: RestTodayRequest
          additionalProperties: false
          required: [local_date, action, schedule_effect, expected_version]
          properties:
            local_date: {type: string, format: date}
            action: {type: string, const: rest}
            schedule_effect: {type: string, const: one_time}
            reason: {type: [string, "null"], maxLength: 300}
            expected_version: {type: integer, minimum: 0}

    SkipTodayRequest:
      type: object
      additionalProperties: false
      required: [local_date, schedule_effect, expected_version]
      properties:
        local_date: {type: string, format: date}
        schedule_effect: {type: string, enum: [advance, keep]}
        reason: {type: [string, "null"], maxLength: 300}
        expected_version: {type: integer, minimum: 0}

    TodayExercisePlanUpdate:
      type: object
      additionalProperties: false
      required: [local_date, items, scope, expected_version]
      properties:
        local_date: {type: string, format: date}
        source_split_day_id: {type: [string, "null"]}
        items:
          type: array
          minItems: 0
          maxItems: 50
          items: {$ref: "#/components/schemas/ExercisePlanItemInput"}
        scope: {type: string, enum: [today_only, save_to_split], default: today_only}
        expected_version: {type: integer, minimum: 0}
      allOf:
        - if:
            required: [scope]
            properties:
              scope: {const: save_to_split}
          then:
            required: [source_split_day_id]
            properties:
              source_split_day_id: {type: string}

    TodayV2:
      type: object
      additionalProperties: false
      required: [local_date, user, planned_day, effective_day, override, schedule_version, exercise_plan, active_session, muscle_targets, water, latest_achievements, avatar, streak]
      properties:
        local_date: {type: string, format: date}
        user: {$ref: "#/components/schemas/CurrentUser"}
        planned_day:
          anyOf:
            - {$ref: "#/components/schemas/SplitDay"}
            - {type: "null"}
        effective_day:
          anyOf:
            - {$ref: "#/components/schemas/SplitDay"}
            - {type: "null"}
        override:
          anyOf:
            - {$ref: "#/components/schemas/DailyPlanOverride"}
            - {type: "null"}
        schedule_version: {type: integer, minimum: 0}
        exercise_plan:
          type: array
          items: {$ref: "#/components/schemas/ExercisePlanItem"}
        active_session:
          anyOf:
            - {$ref: "#/components/schemas/WorkoutSession"}
            - {type: "null"}
        muscle_targets:
          type: array
          items: {$ref: "#/components/schemas/MuscleTarget"}
        water: {$ref: "#/components/schemas/WaterDay"}
        latest_achievements:
          type: array
          items: {$ref: "#/components/schemas/Achievement"}
        avatar: {$ref: "#/components/schemas/AvatarSettings"}
        streak: {$ref: "#/components/schemas/StreakSummary"}

    DemoToday:
      type: object
      additionalProperties: false
      required: [local_date, profile, effective_day, exercise_plan, muscle_targets, avatar, streak]
      properties:
        local_date: {type: string, format: date}
        profile: {$ref: "#/components/schemas/PublicProfile"}
        effective_day:
          anyOf:
            - {$ref: "#/components/schemas/SplitDay"}
            - {type: "null"}
        exercise_plan:
          type: array
          items: {$ref: "#/components/schemas/ExercisePlanItem"}
        muscle_targets:
          type: array
          items: {$ref: "#/components/schemas/MuscleTarget"}
