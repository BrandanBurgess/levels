services:
  api:
    image: python:3.13-slim
    working_dir: /workspace
    command: >-
      sh -c "pip install uv && uv sync --project apps/api --all-groups &&
      uv run --project apps/api flask --app levels_api:create_app run --host 0.0.0.0 --port 8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////workspace/.data/levels-dev.db
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - levels-data:/workspace/.data

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm ci && npm --workspace @levels/web run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_APP_BASE_PATH: /
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules
    depends_on:
      - api

volumes:
  levels-data:
  node-modules:
