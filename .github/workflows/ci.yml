name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22.20.0"
  PYTHON_VERSION: "3.13"

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --project apps/api --frozen --all-groups
      - run: uv run --project apps/api ruff check apps/api/src apps/api/tests
      - run: uv run --project apps/api ruff format --check apps/api/src apps/api/tests

  backend-typecheck:
    name: backend-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --project apps/api --frozen --all-groups
      - run: uv run --project apps/api mypy apps/api/src

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --project apps/api --frozen --all-groups
      - run: uv run --project apps/api pytest apps/api/tests --cov-report=xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: error

  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint:web

  frontend-typecheck:
    name: frontend-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck:web
      - run: npm run typecheck:client

  frontend-tests:
    name: frontend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:web
      - run: npm run test:client
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: apps/web/coverage
          if-no-files-found: error

  openapi-contract:
    name: openapi-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run openapi:check

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build
    needs:
      - backend-lint
      - backend-typecheck
      - backend-tests
      - frontend-lint
      - frontend-typecheck
      - frontend-tests
      - openapi-contract
      - secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_APP_BASE_PATH: /levels/
          VITE_API_BASE_URL: https://example.invalid/api/v1
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  e2e:
    name: e2e
    if: ${{ vars.LEVELS_E2E_ENABLED == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: npm ci
      - run: uv sync --project apps/api --frozen --all-groups
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-failures
          path: |
            playwright-report
            test-results
          if-no-files-found: error
          retention-days: 14
