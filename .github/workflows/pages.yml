name: Deploy Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "22.20.0"

jobs:
  build:
    name: build-pages
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/configure-pages@v6
      - run: npm ci
      - name: Require the production API URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: test -n "$VITE_API_BASE_URL" || { echo "Set the VITE_API_BASE_URL repository variable before deploying Pages."; exit 1; }
      - run: npm run lint:web
      - run: npm run typecheck:web && npm run typecheck:client
      - run: npm run test:web && npm run test:client
      - name: Build project page
        run: npm run build
        env:
          VITE_APP_BASE_PATH: /levels/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy:
    name: deploy-pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
